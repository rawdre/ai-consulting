name: Refresh Mission Control

on:
  schedule:
    - cron: "10 13 * * *"
    - cron: "10 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-mission-control:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Close API key
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: |
          if [ -z "$CLOSE_API_KEY" ]; then
            echo "Missing CLOSE_API_KEY GitHub secret."
            exit 1
          fi

      - name: Run fixture tests
        run: node close_guardrail/tests/close_guardrail.test.mjs

      - name: Refresh mission control snapshot
        if: github.event_name != 'workflow_dispatch'
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          CLOSE_OWNER_NAME: Andre Raw
          CLOSE_OWNER_ID: ${{ secrets.CLOSE_OWNER_ID }}
          CLOSE_API_BASE_URL: ${{ vars.CLOSE_API_BASE_URL }}
        run: node refresh-mission-control.mjs

      - name: Refresh mission control snapshot (manual force)
        if: github.event_name == 'workflow_dispatch'
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          CLOSE_OWNER_NAME: Andre Raw
          CLOSE_OWNER_ID: ${{ secrets.CLOSE_OWNER_ID }}
          CLOSE_API_BASE_URL: ${{ vars.CLOSE_API_BASE_URL }}
          MISSION_CONTROL_FORCE_RUN: "1"
        run: node refresh-mission-control.mjs

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- mission-control-data/latest.json; then
            echo "No mission control changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mission-control-data/latest.json
          git commit -m "Refresh mission control snapshot"
          git push
